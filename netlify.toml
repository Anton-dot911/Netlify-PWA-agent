[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

[dev]
  command    = "npm run dev"
  port       = 5173
  targetPort = 5173

# ── Production context ───────────────────────────────────────
[context.production.environment]
  NODE_ENV         = "production"
  VITE_APP_VERSION = "1.0.0"
  # Add these secrets in Netlify Dashboard → Site Settings → Env Vars:
  # ANTHROPIC_API_KEY   = sk-ant-...
  # DUNE_API_KEY        = your_dune_query_api_key
  # DUNE_SIM_API_KEY    = your_dune_sim_api_key

# ── Security & PWA headers ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' /.netlify/functions/ https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com data:; worker-src 'self' blob:; manifest-src 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-store, no-cache, must-revalidate, max-age=0"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CORS for Netlify Functions ────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# ── SPA fallback ─────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
